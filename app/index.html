<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YiYi - AI Personal Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0E0C1A; }

    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0E0C1A !important;
      transition: opacity 0.3s ease;
      z-index: 9999;
    }

    /* Logo with entrance animation */
    .al-logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      animation: al-entrance 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes al-entrance {
      from { opacity: 0; transform: scale(0.8) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* App name */
    .al-name {
      margin-top: 18px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.88);
      animation: al-fade-up 0.5s 0.1s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* Three pulsing dots */
    .al-dots {
      display: flex;
      gap: 6px;
      margin-top: 28px;
      animation: al-fade-up 0.5s 0.2s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .al-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6366F1;
      animation: al-pulse 1.2s ease-in-out infinite;
    }
    .al-dot:nth-child(2) { animation-delay: 0.2s; }
    .al-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes al-fade-up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes al-pulse {
      0%, 100% { opacity: 0.25; transform: scale(0.85); }
      50%       { opacity: 1;    transform: scale(1.1); }
    }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <img class="al-logo" src="/yiyi-logo.png" alt="YiYi" />
      <div class="al-name">YiYi</div>
      <div class="al-dots">
        <div class="al-dot"></div>
        <div class="al-dot"></div>
        <div class="al-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
