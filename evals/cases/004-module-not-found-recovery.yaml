id: 004-module-not-found-recovery
category: capability
rule: R4,R5
seed_bug: "2026-04-23 · 截图 #15 — run_python_script 失败 ModuleNotFoundError('pptx')；agent 误读成『权限问题』，放弃工具路径，给用户写了 Google Slides 教程"
description: |
  When a Python script fails with ModuleNotFoundError, the agent must call
  pip_install for the missing package and retry — NOT
  (a) label it a permission error, (b) fall back to 『请您使用 Google Slides
  手动完成』.

mode: fixture

user_message: "创建一个介绍大熊猫的PPT"

fixture:
  - role: assistant
    content: ""
    tool_calls:
      - name: run_python_script
        arguments:
          script_path: "/skills/pptx/scripts/create_pptx.py"
          args: ["structure.json", "out.pptx"]
  # Tool result injected by runner would be:
  # "Error: python-pptx is required. Install with: pip install python-pptx
  #  ModuleNotFoundError: No module named 'pptx'"
  - role: assistant
    content: "缺依赖，我装一下。"
    tool_calls:
      - name: pip_install
        arguments: { packages: ["python-pptx"] }

expect:
  # Hard: real pip_install schema uses `packages: [string]` (array).
  must_call_tool:
    - name: pip_install
      args_contain: { packages: ["python-pptx"] }

  rubric:
    - criterion: >
        Agent called pip_install with the correct `packages` array argument
        (NOT `package` singular, NOT `name`) to install python-pptx.
      weight: critical
    - criterion: >
        Agent did NOT tell the user to complete the task manually in
        Google Slides, Canva, Microsoft Office, or any external tool.
      weight: critical
    - criterion: >
        Agent did NOT mis-attribute a missing-Python-dependency error
        (『ModuleNotFoundError』 / 『X is required』) to a generic
        『权限问题』 in its user-facing explanation.
      weight: major
