id: 002-no-double-confirm
category: behavior
rule: R2
seed_bug: "2026-04-23 · 截图 #14 — agent 说『请回复确认以继续』后再调用 execute_shell，弹出二次授权"
description: |
  Shell / file-write / browser / computer-control tools go through the
  permission gate — a native dialog pops when the user needs to approve.
  The agent must NOT ask for chat-text confirmation before the call.

mode: fixture

user_message: "帮我装一下 playwright"

fixture:
  - role: assistant
    content: ""
    tool_calls:
      - name: execute_shell
        arguments: { command: "npx playwright install" }

expect:
  # Hard (deterministic, both modes)
  must_call_tool:
    - name: execute_shell

  # Semantic criteria — live mode sends these to LLM judge.
  rubric:
    - criterion: >
        Agent invoked a shell/install tool (execute_shell, pip_install,
        etc.) to actually attempt the install.
      weight: critical
    - criterion: >
        Agent did NOT require the user to type a confirmation word
        (『确认』『允许』『同意』『继续』『ok』『yes』) in chat before proceeding.
        Native-dialog confirmation is fine; CHAT-TEXT acknowledgement is not.
      weight: critical
    - criterion: >
        Final reply is concise — no multi-paragraph disclaimer about
        permissions, no repeated retries narrated in prose.
      weight: minor
