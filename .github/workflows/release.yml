name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          cache-on-failure: true

      # ── Linux system deps ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── Python setup for PyO3, wheels & stdlib ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare Python dylib for macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd app/src-tauri
          mkdir -p libs

          PYTHON_PATH=$(which python3.13 || which python3)
          PYTHON_PREFIX=$(python3 -c "import sys; print(sys.prefix)")

          # Find libpython dylib
          DYLIB=""
          for candidate in \
            "$PYTHON_PREFIX/lib/libpython3.13.dylib" \
            "$PYTHON_PREFIX/Frameworks/Python.framework/Versions/3.13/lib/libpython3.13.dylib" \
            "/Library/Frameworks/Python.framework/Versions/3.13/lib/libpython3.13.dylib"; do
            if [ -f "$candidate" ]; then
              DYLIB="$candidate"
              break
            fi
          done

          if [ -z "$DYLIB" ]; then
            echo "::error::Could not find libpython3.13.dylib"
            find "$PYTHON_PREFIX" -name "libpython*.dylib" 2>/dev/null || true
            exit 1
          fi

          echo "Found Python dylib: $DYLIB"
          cp "$DYLIB" libs/libpython3.13.dylib

          # Set PYO3_PYTHON for the build
          echo "PYO3_PYTHON=$PYTHON_PATH" >> "$GITHUB_ENV"

      - name: Set PYO3_PYTHON (Linux/Windows)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          PYTHON_PATH=$(which python3.13 || which python3 || which python)
          echo "PYO3_PYTHON=$PYTHON_PATH" >> "$GITHUB_ENV"

      - name: Download platform-specific wheels
        shell: bash
        run: |
          cd app/src-tauri
          # Remove existing platform-specific wheels (keep pure-python ones)
          rm -f wheels/*macosx* wheels/*manylinux* wheels/*win* wheels/*linux*
          # Download wheels for this platform
          pip download \
            -r wheels/requirements.txt \
            --dest wheels/ \
            --only-binary :all: \
            --implementation cp \
            --python-version 313 \
            --no-deps
          ls -la wheels/

      - name: Prepare Python stdlib (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd app/src-tauri
          PYVER=$(python3 -c "import sys; print(f'python{sys.version_info.major}.{sys.version_info.minor}')")
          STDLIB_SRC=$(python3 -c "import sysconfig; print(sysconfig.get_path('stdlib'))")
          if [ -d "$STDLIB_SRC" ]; then
            rm -rf python-stdlib/lib
            mkdir -p python-stdlib/lib/$PYVER
            cp -r "$STDLIB_SRC"/* python-stdlib/lib/$PYVER/
            find python-stdlib -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            find python-stdlib -name test -type d -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Prepare Python stdlib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd app/src-tauri
          $pyver = python -c "import sys; print(f'python{sys.version_info.major}.{sys.version_info.minor}')"
          $stdlib = python -c "import sysconfig; print(sysconfig.get_path('stdlib'))"
          if (Test-Path "$stdlib") {
            Remove-Item -Recurse -Force python-stdlib/lib -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path "python-stdlib/lib/$pyver" -Force
            Copy-Item -Recurse (Join-Path $stdlib '*') "python-stdlib/lib/$pyver/"
            Get-ChildItem -Recurse -Directory -Filter __pycache__ python-stdlib | Remove-Item -Recurse -Force
            Get-ChildItem -Recurse -Directory -Filter test python-stdlib | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      # ── Frontend ──
      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      # ── Build & Upload Release ──
      - name: Check signing key
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY not set, updater signing will be skipped"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PYO3_PYTHON: ${{ env.PYO3_PYTHON }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target ${{ matrix.rust_target }}
          tagName: ${{ github.ref_name }}
          releaseName: "YiYi ${{ github.ref_name }}"
          releaseBody: "See the assets below to download for your platform."
          releaseDraft: true
          prerelease: false

      # ── macOS post-build: fix dylib rpath ──
      - name: Fix macOS dylib rpath
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TARGET="${{ matrix.rust_target }}"
          APP_DIR="app/src-tauri/target/$TARGET/release/bundle/macos/YiYi.app"
          BINARY="$APP_DIR/Contents/MacOS/yiyi"
          FW_DIR="$APP_DIR/Contents/Frameworks"

          if [ -f "$BINARY" ] && [ -f "$FW_DIR/libpython3.13.dylib" ]; then
            echo "Fixing dylib references..."

            # Fix dylib install name
            install_name_tool -id "@rpath/libpython3.13.dylib" \
              "$FW_DIR/libpython3.13.dylib" 2>/dev/null || true

            # Fix binary reference (Intel builds use absolute paths)
            for old_path in \
              "/Library/Frameworks/Python.framework/Versions/3.13/lib/libpython3.13.dylib" \
              "/usr/local/opt/python@3.13/Frameworks/Python.framework/Versions/3.13/Python" \
              "/usr/local/Cellar/python@3.13/3.13.7/Frameworks/Python.framework/Versions/3.13/Python"; do
              install_name_tool -change "$old_path" "@rpath/libpython3.13.dylib" \
                "$BINARY" 2>/dev/null || true
            done

            echo "Linkage after fix:"
            otool -L "$BINARY" | grep -i python || echo "(no python refs found)"
          else
            echo "App bundle or dylib not found, skipping rpath fix"
          fi
