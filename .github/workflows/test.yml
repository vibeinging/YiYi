name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust tests + coverage
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run tests
        working-directory: app/src-tauri
        run: cargo test --features test-support

      - name: Generate LCOV coverage
        working-directory: app/src-tauri
        run: cargo llvm-cov --features test-support --lib --lcov --output-path ../../target/lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: target/lcov.info
          retention-days: 14

  frontend:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests with coverage
        working-directory: app
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lcov
          path: app/coverage/lcov.info
          retention-days: 14
          if-no-files-found: ignore
